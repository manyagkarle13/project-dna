name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: projectdna_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Backend Dependencies
        run: |
          cd Backend
          pip install -r requirements.txt

      - name: Run Django Tests
        env:
          DB_NAME: projectdna_test
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_HOST: localhost
          DEBUG: "True"
        run: |
          cd Backend
          python manage.py test --noinput

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: Frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: |
          cd Frontend
          npm ci

      - name: Build Frontend
        run: |
          cd Frontend
          npm run build

      - name: Run Frontend Tests
        run: |
          cd Frontend
          npm run test -- --coverage --watchAll=false 2>/dev/null || echo "Tests completed"

  security:
    name: Security Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Run Bandit (Python security)
        run: |
          pip install bandit
          bandit -r Backend --skip B101,B601 || true

      - name: OWASP Dependency Check
        uses: jeremylong/DependencyCheck_Action@main
        with:
          project: 'Project-DNA'
          path: '.'
          format: 'JSON'
        continue-on-error: true

  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Backend Image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile.backend
          push: false
          tags: project-dna:backend-latest

      - name: Build Frontend Image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile.frontend
          push: false
          tags: project-dna:frontend-latest

  lint:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Flake8
        run: pip install flake8

      - name: Lint Backend (Flake8)
        run: |
          flake8 Backend --count --select=E9,F63,F7,F82 --show-source --statistics || true
          flake8 Backend --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics || true
