<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Developer Sandbox — Mock Authentication</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #F7F7F5;
      color: #1A1A1A;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      background: #FFFFFF;
      border: 1px solid #E5E5E2;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 12px 48px rgba(0,0,0,0.06);
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
    }
    .logo {
      width: 28px;
      height: 28px;
    }
    .badge {
      font-size: 11px;
      font-weight: 700;
      color: #2D6A4F;
      background: #EAF4EE;
      padding: 4px 8px;
      border-radius: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .title {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 14px;
      color: #6E6E6E;
      line-height: 1.5;
      margin-bottom: 32px;
    }
    .preset-title {
      font-size: 12px;
      font-weight: 600;
      color: #ABABAB;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
    }
    .preset-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 24px;
    }
    .preset-btn {
      background: #FFFFFF;
      border: 1px solid #E5E5E2;
      border-radius: 10px;
      padding: 14px;
      text-align: left;
      cursor: pointer;
      transition: all 150ms;
    }
    .preset-btn:hover {
      border-color: #2D6A4F;
      background: #FDFDFD;
      box-shadow: 0 4px 12px rgba(45, 106, 79, 0.05);
    }
    .preset-name {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 2px;
    }
    .preset-email {
      font-size: 12px;
      color: #6E6E6E;
    }
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #E5E5E2;
    }
    .divider span {
      font-size: 12px;
      color: #ABABAB;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #1A1A1A;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      padding: 12px 16px;
      font-size: 14px;
      border: 1.5px solid #E5E5E2;
      border-radius: 8px;
      font-family: inherit;
      transition: border-color 150ms;
    }
    input:focus {
      outline: none;
      border-color: #2D6A4F;
    }
    .submit-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 14px;
      font-size: 15px;
      font-weight: 600;
      color: #FFFFFF;
      background: #1A1A1A;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 150ms;
      margin-top: 8px;
    }
    .submit-btn:hover {
      background: #333333;
    }
    .provider-icon {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="header">
      <svg class="logo" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M8 4C8 4 12 8 14 14C16 20 20 24 20 24" stroke="#1A1A1A" stroke-width="2.2" stroke-linecap="round"/>
        <path d="M20 4C20 4 16 8 14 14C12 20 8 24 8 24" stroke="#2D6A4F" stroke-width="2.2" stroke-linecap="round"/>
        <line x1="9" y1="9" x2="19" y2="9" stroke="#E5E5E2" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="8" y1="14" x2="20" y2="14" stroke="#E5E5E2" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="9" y1="19" x2="19" y2="19" stroke="#E5E5E2" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span class="badge" id="provider-badge">Google OAuth</span>
    </div>

    <h2 class="title">OAuth Developer Sandbox</h2>
    <p class="subtitle">Mock login active. Choose a profile or enter custom details to proceed without production credentials.</p>

    <div class="preset-title">Select Preset Profile</div>
    <div class="preset-grid">
      <button class="preset-btn" onclick="selectPreset('Dev Coder', 'dev.coder@github.com')">
        <div class="preset-name">Dev Coder</div>
        <div class="preset-email">dev.coder@github.com</div>
      </button>
      <button class="preset-btn" onclick="selectPreset('Alice Smith', 'alice.smith@gmail.com')">
        <div class="preset-name">Alice Smith</div>
        <div class="preset-email">alice.smith@gmail.com</div>
      </button>
    </div>

    <div class="divider"><span>OR CUSTOM DETAILS</span></div>

    <form id="auth-form" action="/auth/mock/callback" method="GET">
      <!-- Hidden fields for provider and fake ID -->
      <input type="hidden" name="provider" id="provider-input" value="google">
      <input type="hidden" name="id" id="id-input" value="">

      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" required placeholder="Jane Doe">
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required placeholder="jane.doe@example.com">
      </div>

      <button type="submit" class="submit-btn" id="submit-btn">
        Authorize & Continue
      </button>
    </form>
  </div>

  <script>
    // Parse URL params to set provider type
    const params = new URLSearchParams(window.location.search);
    const provider = params.get('provider') || 'google';
    
    document.getElementById('provider-input').value = provider;
    document.getElementById('provider-badge').textContent = provider.toUpperCase() + ' MOCK';
    document.getElementById('id-input').value = 'mock_' + provider + '_' + Math.random().toString(36).substring(2, 11);

    if (provider === 'github') {
      document.getElementById('submit-btn').innerHTML = 'Continue with GitHub Mock';
    } else {
      document.getElementById('submit-btn').innerHTML = 'Continue with Google Mock';
    }

    function selectPreset(name, email) {
      document.getElementById('name').value = name;
      document.getElementById('email').value = email;
      document.getElementById('auth-form').submit();
    }
  </script>
</body>
</html>
